version: '3.8'

services:
  banco:
    build: 
      context: .
      dockerfile: _SmokeWorld_Database/Dockerfile
    container_name: smokeworld_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ragnarok}
      MYSQL_USER: ${DB_USER:-ragnarok}
      MYSQL_PASSWORD: ${DB_PASS:?}
    volumes:
      - db_data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smokeworld_net

  servidor:
    build: 
      context: .
      dockerfile: _SmokeWorld_rAthena/Dockerfile
    container_name: smokeworld_server
    restart: unless-stopped
    depends_on:
      banco:
        condition: service_healthy
    environment:
      DB_HOST: banco
      DB_PORT: 3306
      DB_USER: ${DB_USER:-ragnarok}
      DB_PASS: ${DB_PASS:?}
      DB_NAME: ${MYSQL_DATABASE:-ragnarok}
    expose:
      - "5121"
      - "6121"
      - "6900"
      - "6901"
    networks:
      - smokeworld_net
    volumes:
      - ./_SmokeWorld_rAthena/conf/import:/rathena/conf/import

  painel:
    build: 
      context: .
      dockerfile: _SmokeWorld_FluxCP/Dockerfile
    container_name: smokeworld_fluxcp
    restart: unless-stopped
    depends_on:
      banco:
        condition: service_healthy
    environment:
      DB_HOST: banco
      DB_PORT: 3306
      DB_USER: ${DB_USER:-ragnarok}
      DB_PASS: ${DB_PASS:?}
      DB_NAME: ${MYSQL_DATABASE:-ragnarok}
      SERVER_HOST: servidor
    expose:
      - "80"
    networks:
      - smokeworld_net
    volumes:
      - ./_SmokeWorld_FluxCP/config:/var/www/html/config

  patcher:
    build: 
      context: .
      dockerfile: _SmokeWorld_Patcher/Dockerfile
    container_name: smokeworld_patcher
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - smokeworld_net
    volumes:
      - ./_SmokeWorld_Patcher/patch-files:/usr/share/nginx/html:ro

volumes:
  db_data:

networks:
  smokeworld_net:
    driver: bridge