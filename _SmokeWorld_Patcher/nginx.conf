events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Configuraš§es de performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Logging
    access_log /dev/stdout combined;
    error_log /dev/stderr warn;

    # Cache settings
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Headers de seguranša
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # Thor Patcher - Configuraš§es especÝficas
        location / {
            # Listagem de diretˇrios (˙til para debug, pode desabilitar em produšŃo)
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            
            # Cache para arquivos do patcher
            location ~* \.(grf|thor|gz|zip|7z|rar)$ {
                expires max;
                add_header Cache-Control "public, immutable";
                add_header X-Patcher-File "true";
            }

            # Arquivos pequenos (menos cache)
            location ~* \.(txt|xml|json)$ {
                expires 1h;
                add_header Cache-Control "public, must-revalidate";
            }
        }

        # Status page para monitoramento
        location /status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }

        # Error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}