<VirtualHost *:80>
    ServerAdmin webmaster@smokeworld.com
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
        
        # Protege pastas sensŪveis
        <DirectoryMatch "/?(config|data|logs)/">
            Require all denied
        </DirectoryMatch>
    </Directory>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/smokeworld_error.log
    CustomLog ${APACHE_LOG_DIR}/smokeworld_access.log combined

    # Compress„o GZIP
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript

    # Cache para arquivos estŠticos
    <FilesMatch "\.(ico|jpg|jpeg|png|gif|css|js)$">
        Header set Cache-Control "max-age=2592000, public"
    </FilesMatch>
</VirtualHost>